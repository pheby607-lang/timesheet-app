<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard & Worksheet Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #5a57ea; 
            --primary-hover: #4845d1;
            --bg-color: #f4f6f8; 
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --sidebar-bg: #ffffff;
            --google-red: #DB4437;
            --phone-green: #25D366;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- Auth Screen (Mountain Background) --- */
        #auth-screen {
            display: flex;
            height: 100vh;
            width: 100vw;
            align-items: center;
            justify-content: center;
            /* Mountain placeholder - replace URL with your uploaded mountain image path if hosted locally */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070') center/cover no-repeat;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .auth-card h2 { margin-bottom: 24px; color: var(--text-main); }

        .auth-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            color: #fff;
            transition: opacity 0.3s ease;
        }

        .auth-btn:hover { opacity: 0.9; }
        .btn-google { background-color: var(--google-red); }
        .btn-phone { background-color: var(--phone-green); }

        /* --- Dashboard Layout --- */
        #app-screen {
            display: none;
            height: 100vh;
            display: flex;
        }

        /* Sidebar (Desktop) */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        .sidebar-brand {
            font-size: 20px;
            font-weight: 700;
            padding: 0 20px 20px;
            color: var(--primary);
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .nav-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background-color: #f0f4ff;
            color: var(--primary);
            border-right: 4px solid var(--primary);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .top-header {
            background: var(--card-bg);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .dashboard-body {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            border: 1px solid var(--border-color);
        }

        .stat-card h3 { font-size: 14px; color: var(--text-muted); margin-bottom: 8px;}
        .stat-card .value { font-size: 24px; font-weight: 700; color: var(--text-main); }

        /* Charts & Reports Area */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .card-header {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Worksheet Table Integration */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }
        th { background: #f9fafb; color: var(--text-muted); font-weight: 600; }
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-green { background: #d1fae5; color: #065f46; }
        .badge-yellow { background: #fef3c7; color: #92400e; }
        .badge-red { background: #fee2e2; color: #991b1b; }

        /* --- Mobile Specific UI --- */
        .mobile-fab {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: var(--primary);
            color: white;
            border: none;
            font-size: 24px;
            box-shadow: 0 4px 12px rgba(90, 87, 234, 0.4);
            cursor: pointer;
            z-index: 1000;
        }

        .fab-menu {
            display: none;
            position: fixed;
            bottom: 100px;
            right: 30px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            flex-direction: column;
            overflow: hidden;
            z-index: 999;
        }

        .fab-menu.active { display: flex; }
        .fab-item {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            font-weight: 500;
        }
        .fab-item:hover { background: #f3f4f6; }

        @media (max-width: 768px) {
            .sidebar { display: none; } /* Hide sidebar on mobile */
            .content-grid { grid-template-columns: 1fr; }
            .mobile-fab { display: flex; align-items: center; justify-content: center; }
            .top-header { border-bottom: none; background: transparent; }
            .dashboard-body { padding: 15px; }
            #app-screen { display: block; } /* Override flex for mobile */
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p style="color: var(--text-muted); margin-bottom: 24px;">Sign in to access your dashboard</p>
            
            <button class="auth-btn btn-google" onclick="login()">
                <i class="fab fa-google"></i> Continue with Google
            </button>
            <button class="auth-btn btn-phone" onclick="login()">
                <i class="fas fa-phone"></i> Continue with Phone
            </button>
        </div>
    </div>

    <div id="app-screen" style="display: none;">
        
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-layer-group"></i> Portal
            </div>
            <nav>
                <a class="nav-item active" onclick="switchTab('dashboard')">
                    <i class="fas fa-chart-pie"></i> Dashboard
                </a>
                <a class="nav-item" onclick="switchTab('reports')">
                    <i class="fas fa-file-alt"></i> Reports
                </a>
                <a class="nav-item" onclick="switchTab('logs')">
                    <i class="fas fa-list"></i> Work Logs
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h2 id="page-title">Dashboard Overview</h2>
                <div class="user-profile">
                    <i class="fas fa-user-circle" style="font-size: 28px; color: var(--text-muted);"></i>
                </div>
            </header>

            <div class="dashboard-body">
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Tasks</h3>
                        <div class="value" id="stat-total">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Completed</h3>
                        <div class="value" style="color: var(--success);" id="stat-completed">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>In Progress</h3>
                        <div class="value" style="color: var(--warning);" id="stat-pending">0</div>
                    </div>
                </div>

                <div class="content-grid">
                    <div class="card">
                        <div class="card-header">Task Status Analytics</div>
                        <canvas id="statusChart" width="100" height="100"></canvas>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            Recent Work Reports
                            <button style="border:none; background:var(--primary); color:white; padding:6px 12px; border-radius:6px; cursor:pointer;" onclick="renderWl(allWlRecords)">Refresh</button>
                        </div>
                        <div class="table-responsive">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Work Description</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="work-body">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <button class="mobile-fab" onclick="toggleFabMenu()">
            <i class="fas fa-plus"></i>
        </button>

        <div class="fab-menu" id="fab-options">
            <div class="fab-item" onclick="alert('Add Goal feature triggered')">Add Goals</div>
            <div class="fab-item" onclick="alert('Add Leave feature triggered')">Add Leaves</div>
            <div class="fab-item" onclick="alert('Add Weekoff feature triggered')">Add Weekoff</div>
            <div class="fab-item" onclick="alert('Log Time feature triggered')">Log Time</div>
        </div>
    </div>

    <script>
        // --- 1. Mock Data Integration (Derived from your worksheet portal needs) ---
        const allWlRecords = [
            { date: '2026-06-01', description: 'Internal Audit Report Prep', status: 'Completed' },
            { date: '2026-06-02', description: 'Tax Compliance Review', status: 'In Progress' },
            { date: '2026-06-03', description: 'MIS Data Reconciliation', status: 'Completed' },
            { date: '2026-06-04', description: 'Stock Auditing Draft', status: 'Pending' },
            { date: '2026-06-05', description: 'CMA USA Chapter 4 Study', status: 'Completed' }
        ];

        let myChart = null;

        // --- 2. Authentication Logic ---
        function login() {
            document.getElementById('auth-screen').style.display = 'none';
            // Use flex for desktop, block for mobile fallback is handled in media query logic natively via flex layout
            document.getElementById('app-screen').style.display = 'flex'; 
            
            // Initialize Dashboard Data
            renderWl(allWlRecords);
            calculateStats();
            initChart();
        }

        // --- 3. UI Interactions ---
        function switchTab(tabName) {
            // Highlight active nav
            const items = document.querySelectorAll('.nav-item');
            items.forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Change title
            const titles = {
                'dashboard': 'Dashboard Overview',
                'reports': 'Detailed Reports',
                'logs': 'Work Logs'
            };
            document.getElementById('page-title').innerText = titles[tabName];
        }

        function toggleFabMenu() {
            const menu = document.getElementById('fab-options');
            menu.classList.toggle('active');
        }

        // --- 4. Core Logic Integration (Rendering Table & Stats) ---
        function renderWl(records) {
            const tbody = document.getElementById('work-body');
            if (!records.length) {
                tbody.innerHTML = '<tr><td colspan="3" style="color:var(--text-muted);padding:20px;text-align:center;">No records found.</td></tr>';
                return;
            }
            tbody.innerHTML = records.map(d => {
                let badgeClass = 'badge-yellow';
                if(d.status === 'Completed') badgeClass = 'badge-green';
                if(d.status === 'Pending') badgeClass = 'badge-red';

                return `<tr>
                    <td data-label="Date"><strong>${d.date}</strong></td>
                    <td data-label="Work Done">${d.description}</td>
                    <td data-label="Status"><span class="badge ${badgeClass}">${d.status}</span></td>
                </tr>`;
            }).join('');
        }

        function calculateStats() {
            const total = allWlRecords.length;
            const completed = allWlRecords.filter(r => r.status === 'Completed').length;
            const pending = total - completed;

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-completed').innerText = completed;
            document.getElementById('stat-pending').innerText = pending;
        }

        // --- 5. Chart.js Real Data Integration ---
        function initChart() {
            const ctx = document.getElementById('statusChart').getContext('2d');
            
            // Calculate dynamic data from the integrated records
            let completedCount = 0;
            let inProgressCount = 0;
            let pendingCount = 0;

            allWlRecords.forEach(record => {
                if (record.status === 'Completed') completedCount++;
                else if (record.status === 'In Progress') inProgressCount++;
                else pendingCount++;
            });

            if(myChart) myChart.destroy(); // destroy old chart if re-rendering

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Completed', 'In Progress', 'Pending'],
                    datasets: [{
                        data: [completedCount, inProgressCount, pendingCount],
                        backgroundColor: ['#10b981', '#f59e0b', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    },
                    cutout: '75%'
                }
            });
        }

        // Close FAB menu when clicking outside
        window.addEventListener('click', function(e) {
            if (!e.target.closest('.mobile-fab') && !e.target.closest('.fab-menu')) {
                document.getElementById('fab-options').classList.remove('active');
            }
        });
    </script>
</body>
</html>

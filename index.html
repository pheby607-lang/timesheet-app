<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Attendance Timesheet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1, h2 { color: #1a365d; text-align: center; }
        
        /* Forms & Inputs */
        input, button, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn { background: #2b6cb0; color: white; border: none; cursor: pointer; font-weight: bold; padding: 12px; }
        .btn:hover { background: #2c5282; }
        .btn-outline { background: white; color: #2b6cb0; border: 2px solid #2b6cb0; }
        
        .hidden { display: none; }
        
        /* Profile Summary Area matching your design */
        .profile-header { display: flex; justify-content: space-between; border: 1px solid #cbd5e0; padding: 15px; margin-bottom: 20px; border-radius: 4px; background: #fff; }
        .profile-header div p { margin: 5px 0; font-size: 14px; }
        
        /* Table Structure matching image_4dc358.png */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; text-align: center; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; }
        th { background-color: #1a365d; color: white; }
        .status-present { color: green; font-weight: bold; }
        .status-leave { color: red; font-weight: bold; }
        .status-weekend { color: blue; font-weight: bold; }
        .status-half { color: orange; font-weight: bold; }
        
        /* Action Utility Buttons */
        .action-bar { display: flex; justify-content: space-between; margin-top: 20px; }
        .export-btn { background: #38a169; width: auto; padding: 10px 30px; }
        .add-btn { background: #2b6cb0; width: auto; padding: 10px 30px; }
        
        .divider-text { text-align: center; margin: 15px 0; color: #718096; font-weight: bold; font-size: 12px; text-transform: uppercase; }
        
        /* Data Entry Modal Pop-up Layer */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: white; padding: 30px; border-radius: 8px; width: 90%; max-width: 500px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container">
    
    <div id="auth-section">
        <h1>Timesheet Portal</h1>
        
        <div id="login-form">
            <h2>Log In</h2>
            <input type="email" id="login-email" placeholder="Email Address">
            <input type="password" id="login-password" placeholder="Password">
            <button class="btn" onclick="login()">Login with Email</button>
            
            <div class="divider-text">OR</div>
            
            <div id="phone-login-box">
                <input type="text" id="login-phone" placeholder="Phone Number (e.g., +919876543210)">
                <button class="btn" style="background: #4a5568;" onclick="loginWithPhone()">Login with Phone</button>
            </div>

            <div class="divider-text">OR</div>
            
            <button class="btn" style="background: #e53e3e;" onclick="loginWithGoogle()">Login with Google</button>
            
            <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 20px 0;">
            <button class="btn btn-outline" onclick="toggleAuth('register')">New Here? Register for Timesheet</button>
        </div>

        <div id="register-form" class="hidden">
            <h2>First-Time Registration</h2>
            <input type="text" id="reg-name" placeholder="Full Name (e.g. shricharan bharadwaj)">
            <input type="text" id="reg-empId" placeholder="Employee ID (e.g. I210062)">
            <input type="number" id="reg-hours" placeholder="Standard Working Hours (e.g. 9)">
            <input type="email" id="reg-email" placeholder="Email Address">
            <input type="password" id="reg-password" placeholder="Password">
            <button class="btn" onclick="register()">Complete Registration</button>
            <button class="btn btn-outline" onclick="toggleAuth('login')">Back to Login</button>
        </div>
        
        <div id="recaptcha-container"></div>
    </div>

    <div id="app-section" class="hidden">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h2 style="margin: 0;">Monthly Attendance Timesheet</h2>
            <button class="btn btn-outline" style="width: auto; padding: 6px 15px;" onclick="logout()">Log Out</button>
        </div>

        <div id="timesheet-report">
            <div class="profile-header">
                <div>
                    <p><strong>Employee Name:</strong> <span id="display-name">...</span></p>
                    <p><strong>Employee Number:</strong> <span id="display-empId">...</span></p>
                </div>
                <div>
                    <p><strong>Standard Hours:</strong> <span id="display-hours">...</span> hrs/day</p>
                    <p><strong>Month:</strong> <span id="display-month">...</span></p>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>In Time</th>
                        <th>Out Time</th>
                        <th>Break (Mins)</th>
                        <th>Working Hrs</th>
                        <th>Overtime</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="timesheet-body">
                    </tbody>
            </table>
        </div>

        <div class="action-bar">
            <button class="btn add-btn" onclick="toggleModal(true)">+ Log Daily Attendance</button>
            <button class="btn export-btn" onclick="downloadPDF()">Download as PDF</button>
        </div>
    </div>

</div>

<div id="entry-modal" class="modal-overlay hidden">
    <div class="modal-box">
        <h3 style="margin-top: 0; color: #1a365d;">Log Daily Entry</h3>
        
        <label>Date</label>
        <input type="date" id="entry-date">
        
        <label>In Time</label>
        <input type="time" id="entry-in">
        
        <label>Out Time</label>
        <input type="time" id="entry-out">
        
        <label>Break (Minutes)</label>
        <input type="number" id="entry-break" value="60">
        
        <label>Status</label>
        <select id="entry-status">
            <option value="Present">Present</option>
            <option value="Leave">Leave</option>
            <option value="Weekend">Weekend</option>
            <option value="Half Day">Half Day</option>
        </select>
        
        <button class="btn" style="margin-top: 15px;" onclick="addEntry()">Save Entry</button>
        <button class="btn btn-outline" onclick="toggleModal(false)">Cancel</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // Config block populated with your active tokens
    const firebaseConfig = {
        apiKey: "AIzaSyDoUUzyRcrCO-gabmXrt2Z-snBgBhA7J_c",
        authDomain: "timesheet-app-ce774.firebaseapp.com",
        projectId: "timesheet-app-ce774",
        storageBucket: "timesheet-app-ce774.firebasestorage.app",
        messagingSenderId: "592261213402",
        appId: "1:592261213402:web:db3244af6d37f74f0289e3",
        measurementId: "G-QE3YHWDQWB"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUserData = {};

    function toggleAuth(view) {
        document.getElementById('login-form').classList.toggle('hidden', view !== 'login');
        document.getElementById('register-form').classList.toggle('hidden', view !== 'register');
    }

    function toggleModal(show) {
        document.getElementById('entry-modal').classList.toggle('hidden', !show);
    }

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            
            const doc = await db.collection('users').doc(user.uid).get();
            if (doc.exists) {
                currentUserData = doc.data();
                document.getElementById('display-name').innerText = currentUserData.name;
                document.getElementById('display-empId').innerText = currentUserData.empId;
                document.getElementById('display-hours').innerText = currentUserData.standardHours;
                
                const date = new Date();
                document.getElementById('display-month').innerText = date.toLocaleString('default', { month: 'long', year: 'numeric' });
                
                loadTimesheets(user.uid);
            } else {
                alert("Authentication verified! Please complete your profile registration.");
                toggleAuth('register');
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('app-section').classList.add('hidden');
            }
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('app-section').classList.add('hidden');
        }
    });

    async function register() {
        const email = document.getElementById('reg-email').value;
        const pass = document.getElementById('reg-password').value;
        const name = document.getElementById('reg-name').value;
        const empId = document.getElementById('reg-empId').value;
        const standardHours = document.getElementById('reg-hours').value;

        if(!name || !empId || !standardHours || !email || !pass) {
            return alert("Please fill up all fields to finalize registration.");
        }

        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
            await db.collection('users').doc(userCredential.user.uid).set({
                name: name,
                empId: empId,
                standardHours: Number(standardHours),
                email: email
            });
            alert("Registration successful!");
        } catch (error) {
            alert(error.message);
        }
    }

    function login() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-password').value;
        
        if (!email || !pass) return alert("Please provide your login credentials.");

        auth.signInWithEmailAndPassword(email, pass).catch(err => {
            if (err.code === "auth/user-not-found" || err.code === "auth/wrong-password" || err.code === "auth/invalid-credential") {
                alert("No account found, please register.");
            } else {
                alert(err.message);
            }
        });
    }

    function loginWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(err => alert(err.message));
    }

    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });
    function loginWithPhone() {
        const phoneNumber = document.getElementById('login-phone').value;
        if (!phoneNumber) return alert("Please specify a phone number including country code (e.g. +91...)");

        auth.signInWithPhoneNumber(phoneNumber, window.recaptchaVerifier)
            .then((confirmationResult) => {
                const code = prompt("Enter the OTP SMS sent to your phone:");
                if(code) {
                    confirmationResult.confirm(code).catch(() => alert("Invalid verification code entry."));
                }
            }).catch(err => alert(err.message));
    }

    function logout() { auth.signOut(); }

    // Smart Time & Minute-Level Overtime Calculator
    function calculateTimeMath(inTimeStr, outTimeStr, breakMinsStr, status) {
        if (status === 'Leave' || status === 'Weekend') {
            return { workFormatted: '-', overFormatted: '-' };
        }

        const breakMins = parseInt(breakMinsStr) || 0;
        const stdMins = currentUserData.standardHours * 60;

        const inMins = parseInt(inTimeStr.split(':')[0]) * 60 + parseInt(inTimeStr.split(':')[1]);
        let outMins = parseInt(outTimeStr.split(':')[0]) * 60 + parseInt(outTimeStr.split(':')[1]);
        
        if (outMins < inMins) outMins += 24 * 60; // Over-midnight support

        const totalWorkedMins = (outMins - inMins) - breakMins;
        const overtimeMins = Math.max(0, totalWorkedMins - stdMins);

        const formatTime = (mins) => {
            const h = Math.floor(mins / 60).toString().padStart(2, '0');
            const m = (mins % 60).toString().padStart(2, '0');
            return `${h}:${m}`;
        };

        return {
            workFormatted: formatTime(totalWorkedMins),
            overFormatted: overtimeMins > 0 ? formatTime(overtimeMins) : '00:00'
        };
    }

    function addEntry() {
        const date = document.getElementById('entry-date').value;
        const inTime = document.getElementById('entry-in').value;
        const outTime = document.getElementById('entry-out').value;
        const breakMins = document.getElementById('entry-break').value;
        const status = document.getElementById('entry-status').value;

        if (!date) return alert("Date selection is mandatory.");

        const calc = calculateTimeMath(inTime, outTime, breakMins, status);

        db.collection('timesheets').add({
            userId: auth.currentUser.uid,
            date: date,
            inTime: inTime || '-',
            outTime: outTime || '-',
            breakMins: breakMins || '-',
            workingHrs: calc.workFormatted,
            overtime: calc.overFormatted,
            status: status
        }).then(() => {
            alert("Daily Attendance logged successfully!");
            toggleModal(false);
        }).catch(err => alert("Database Error: " + err.message));
    }

    function loadTimesheets(userId) {
        db.collection('timesheets').where("userId", "==", userId)
          .orderBy("date", "asc")
          .onSnapshot(snapshot => {
            const tbody = document.getElementById('timesheet-body');
            tbody.innerHTML = '';
            
            if(snapshot.empty) {
                tbody.innerHTML = `<tr><td colspan="7" style="color: #a0aec0; padding: 20px;">No records found. Click "+ Log Daily Attendance" below to add details.</td></tr>`;
                return;
            }

            snapshot.forEach(doc => {
                const data = doc.data();
                let statusClass = '';
                if(data.status === 'Present') statusClass = 'status-present';
                if(data.status === 'Leave') statusClass = 'status-leave';
                if(data.status === 'Weekend') statusClass = 'status-weekend';
                if(data.status === 'Half Day') statusClass = 'status-half';

                const format12hr = (timeStr) => {
                    if (!timeStr || timeStr === '-') return '-';
                    let [h, m] = timeStr.split(':');
                    let ampm = h >= 12 ? 'PM' : 'AM';
                    h = h % 12 || 12;
                    return `${h.toString().padStart(2, '0')}:${m} ${ampm}`;
                };

                tbody.innerHTML += `
                    <tr>
                        <td><strong>${data.date}</strong></td>
                        <td>${format12hr(data.inTime)}</td>
                        <td>${format12hr(data.outTime)}</td>
                        <td>${data.breakMins === '-' ? '-' : (data.breakMins + ' min')}</td>
                        <td>${data.workingHrs}</td>
                        <td style="color: ${data.overtime !== '00:00' && data.overtime !== '-' ? '#e53e3e' : '#333'}; font-weight: ${data.overtime !== '00:00' && data.overtime !== '-' ? 'bold' : 'normal'};">
                            ${data.overtime}
                        </td>
                        <td class="${statusClass}">${data.status}</td>
                    </tr>
                `;
            });
        });
    }

    function downloadPDF() {
        const element = document.getElementById('timesheet-report');
        const opt = {
            margin:       0.4,
            filename:     'Monthly_Attendance_Timesheet.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2 },
            jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>
</body>
</html>
